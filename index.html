<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Joy - Recolector de Frutas</title>
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
            <div id="fruit-counter">
                <span id="fruit-icon">🍎</span>
                <span id="fruit-collected">0</span>
                <span class="fruit-separator">/</span>
                <span id="fruit-remaining">0</span>
            </div>
            <div id="boost-bar-container">
                <div id="boost-icon">💧</div>
                <div id="boost-bar-bg">
                    <div id="boost-bar"></div>
                </div>
            </div>
            <div id="minimap-container">
                <canvas id="minimap-canvas"></canvas>
            </div>
            <div id="compass-container">
                <canvas id="compass-canvas"></canvas>
                <div id="compass-label">🍎 Fruta más cercana</div>
            </div>
            <div id="instructions">
                <p>W/↑ - Avanzar | S/↓ - Retroceder | A/← D/→ - Girar</p>
                <p>SHIFT - Correr | ESPACIO - Saltar</p>
            </div>
            <div id="message-container"></div>
        </div>
        <div id="start-screen">
            <h1>🌳 World of Joy 🌳</h1>
            <p>¡Explora el mundo abierto y recoge toda la fruta!</p>
            <button id="start-button">¡Jugar!</button>
        </div>
        <div id="loading-screen">
            <div id="loading-bar-container">
                <div id="loading-bar"></div>
            </div>
            <p id="loading-text">Cargando...</p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
